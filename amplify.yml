version: 1
frontend:
  phases:
    preBuild:
      commands:
        - apt-get install git-lfs
        - git lfs install
        - git lfs pull
    build:
      commands:
        - npm install
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**