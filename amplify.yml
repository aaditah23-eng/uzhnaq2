version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yum install -y git-lfs || apt-get install -y git-lfs || echo "WARNING - git-lfs installation failed"
        - git lfs install
        - git lfs pull
    build:
      commands:
        - echo "Build complete"
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'
