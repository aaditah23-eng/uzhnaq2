customHeaders:
  - pattern: '**/*.glb'
    headers:
      - key: Content-Type
        value: model/gltf-binary
      - key: Cache-Control
        value: public, max-age=31536000, immutable
      - key: Access-Control-Allow-Origin
        value: '*'
  - pattern: '**/*.gltf'
    headers:
      - key: Content-Type
        value: model/gltf+json
      - key: Cache-Control
        value: public, max-age=31536000, immutable
      - key: Access-Control-Allow-Origin
        value: '*'
